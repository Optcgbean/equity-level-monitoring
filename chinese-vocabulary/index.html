<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文詞語朗讀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e74c3c;
            display: inline-block;
        }
        .lang-note {
            text-align: center;
            color: #e74c3c;
            font-size: 0.8rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* === WORDS SECTION === */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .word-card {
            background: white;
            border-radius: 12px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .word-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
            letter-spacing: 0.05em;
        }
        .play-btn {
            width: auto;
            min-width: 100px;
            height: 42px;
            border-radius: 21px;
            border: none;
            background: #e74c3c;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 16px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.3);
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
        }
        .play-btn:hover {
            background: #c0392b;
        }
        .play-btn:active {
            transform: scale(0.95);
        }
        .play-btn.playing-mandarin {
            background: #e74c3c;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.4);
        }
        .play-btn.playing-cantonese {
            background: #27ae60;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.4);
        }
        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .play-btn .btn-label {
            white-space: nowrap;
        }

        /* === SENTENCES SECTION === */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .sentence-card {
            background: white;
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .sentence-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .sentence-header {
            font-size: 0.75rem;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .sentence-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .sentence-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-mandarin {
            background: #e74c3c;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.3);
        }
        .btn-mandarin:hover {
            background: #c0392b;
        }
        .btn-cantonese {
            background: #27ae60;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.3);
        }
        .btn-cantonese:hover {
            background: #219a52;
        }
        .btn-mandarin.playing {
            background: #c0392b;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
        }
        .btn-cantonese.playing {
            background: #219a52;
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.5);
        }

        @media (max-width: 400px) {
            .word-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .word-text {
                font-size: 1.4rem;
            }
            .play-btn {
                min-width: 90px;
                padding: 0 12px;
                font-size: 0.8rem;
            }
            .sentence-text {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>中文詞語朗讀</h1>
        <p class="subtitle">點擊按鈕朗讀詞語</p>
        <p class="lang-note">🔊 詞語：先讀普通話，再讀粵語</p>

        <!-- WORDS -->
        <div class="section">
            <div class="section-title">詞語</div>
            <div class="word-grid" id="wordGrid"></div>
        </div>

        <!-- SENTENCES -->
        <div class="section">
            <div class="section-title">句子</div>
            <div class="sentence-list" id="sentenceList"></div>
        </div>
    </div>

    <script>
        const words = [
            { text: "興奮", pinyin: "xīng fèn" },
            { text: "緊張", pinyin: "jǐn zhāng" },
            { text: "失望", pinyin: "shī wàng" },
            { text: "假裝", pinyin: "jiǎ zhuāng" },
            { text: "模仿", pinyin: "mó fǎng" },
            { text: "可愛", pinyin: "kě ài" },
            { text: "終於", pinyin: "zhōng yú" },
            { text: "願意", pinyin: "yuàn yì" },
            { text: "輪流", pinyin: "lún liú" },
            { text: "神氣", pinyin: "shén qì" },
            { text: "擔心", pinyin: "dān xīn" },
            { text: "清早", pinyin: "qīng zǎo" },
            { text: "滿意", pinyin: "mǎn yì" },
            { text: "仔細", pinyin: "zǐ xì" },
            { text: "精神一振", pinyin: "jīng shén yī zhèn" },
            { text: "需要", pinyin: "xū yào" },
            { text: "習慣", pinyin: "xí guàn" },
            { text: "歡呼", pinyin: "huān hū" },
            { text: "忘記", pinyin: "wàng jì" },
            { text: "自言自語", pinyin: "zì yán zì yǔ" }
        ];

        const sentences = [
            { group: "第一組", text: "1. 小烏龜很失望，一邊爬一邊想。" },
            { group: "第一組", text: "2. 從現在開始，每種動物都按照自己習慣的方式過日子。" },
            { group: "第二組", text: "1. 她又興奮又緊張，等待去一個新的家。" },
            { group: "第二組", text: "2. 小桃花立即精神一振，她的新生活終於開始了！" },
            { group: "第三組", text: "1. 小桃花賣不出去，給無情地掃到一邊。" },
            { group: "第三組", text: "2. 森林旅店開業那天，許多旅客來住宿，把小兔忙得團團轉。" },
            { group: "第四組", text: "1. 誰做得最好，誰就是森林裏的新大王。" },
            { group: "第四組", text: "2. 森林裏來來往往的旅客很多，可是沒有一家旅店。" },
            { group: "第五組", text: "1. 小兔仔細地閱讀旅客的批評意見。" },
            { group: "第五組", text: "2. 小烏龜一聽，馬上把葉子、筷子、繩子全部抖下來。" }
        ];

        let currentBtn = null;
        let isPlaying = false;

        const playIcon = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        const stopIcon = '<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>';

        function speak(text, lang, rate, pitch) {
            return new Promise((resolve) => {
                window.speechSynthesis.cancel();
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    utterance.rate = rate;
                    utterance.pitch = pitch;
                    utterance.onend = () => resolve();
                    utterance.onerror = () => resolve();
                    window.speechSynthesis.speak(utterance);
                }, 100);
            });
        }

        function stopAll() {
            window.speechSynthesis.cancel();
            isPlaying = false;
            if (currentBtn) {
                resetBtn(currentBtn);
                currentBtn = null;
            }
        }

        function setPlaying(btn, lang) {
            if (currentBtn && currentBtn !== btn) {
                resetBtn(currentBtn);
            }
            currentBtn = btn;
            isPlaying = true;
            btn.classList.add('playing');
            btn.innerHTML = stopIcon + '<span class="btn-label">播放中</span>';
        }

        function resetBtn(btn) {
            btn.classList.remove('playing');
            if (btn.classList.contains('btn-mandarin')) {
                btn.innerHTML = playIcon + '<span class="btn-label">普通話</span>';
            } else if (btn.classList.contains('btn-cantonese')) {
                btn.innerHTML = playIcon + '<span class="btn-label">粵語</span>';
            } else {
                btn.innerHTML = playIcon + '<span class="btn-label">朗讀</span>';
            }
        }

        // === WORDS: single button plays both ===
        async function playWordSequence(word, btn) {
            if (isPlaying && currentBtn === btn) {
                stopAll();
                return;
            }
            stopAll();

            currentBtn = btn;
            isPlaying = true;

            btn.className = 'play-btn playing-mandarin';
            btn.innerHTML = playIcon + '<span class="btn-label">普通話</span>';

            await speak(word.text, 'zh-TW', 0.85, 1);

            btn.className = 'play-btn playing-cantonese';
            btn.innerHTML = playIcon + '<span class="btn-label">粵語</span>';

            await speak(word.text, 'zh-HK', 0.85, 1);

            resetBtn(btn);
            isPlaying = false;
            currentBtn = null;
        }

        function renderWords() {
            const grid = document.getElementById('wordGrid');
            words.forEach((word) => {
                const card = document.createElement('div');
                card.className = 'word-card';

                const text = document.createElement('div');
                text.className = 'word-text';
                text.textContent = word.text;

                const btn = document.createElement('button');
                btn.className = 'play-btn';
                btn.innerHTML = playIcon + '<span class="btn-label">朗讀</span>';
                btn.setAttribute('aria-label', `朗讀 ${word.text}（普通話及粵語）`);
                btn.title = `朗讀：${word.text}`;

                btn.addEventListener('click', () => playWordSequence(word, btn));

                card.appendChild(text);
                card.appendChild(btn);
                grid.appendChild(card);
            });
        }

        // === SENTENCES: two separate buttons ===
        async function playSentence(text, btn, lang) {
            if (isPlaying && currentBtn === btn) {
                stopAll();
                return;
            }
            stopAll();

            const langCode = lang === 'mandarin' ? 'zh-TW' : 'zh-HK';
            setPlaying(btn, lang);

            await speak(text, langCode, 0.8, 1);

            resetBtn(btn);
            isPlaying = false;
            currentBtn = null;
        }

        function renderSentences() {
            const list = document.getElementById('sentenceList');
            sentences.forEach((sentence) => {
                const card = document.createElement('div');
                card.className = 'sentence-card';

                const header = document.createElement('div');
                header.className = 'sentence-header';
                header.textContent = sentence.group;

                const text = document.createElement('div');
                text.className = 'sentence-text';
                text.textContent = sentence.text;

                const actions = document.createElement('div');
                actions.className = 'sentence-actions';

                const btnMandarin = document.createElement('button');
                btnMandarin.className = 'play-btn btn-mandarin';
                btnMandarin.innerHTML = playIcon + '<span class="btn-label">普通話</span>';
                btnMandarin.setAttribute('aria-label', `普通話朗讀：${sentence.text}`);
                btnMandarin.title = `普通話朗讀：${sentence.text}`;
                btnMandarin.addEventListener('click', () => playSentence(sentence.text, btnMandarin, 'mandarin'));

                const btnCantonese = document.createElement('button');
                btnCantonese.className = 'play-btn btn-cantonese';
                btnCantonese.innerHTML = playIcon + '<span class="btn-label">粵語</span>';
                btnCantonese.setAttribute('aria-label', `粵語朗讀：${sentence.text}`);
                btnCantonese.title = `粵語朗讀：${sentence.text}`;
                btnCantonese.addEventListener('click', () => playSentence(sentence.text, btnCantonese, 'cantonese'));

                actions.appendChild(btnMandarin);
                actions.appendChild(btnCantonese);

                card.appendChild(header);
                card.appendChild(text);
                card.appendChild(actions);
                list.appendChild(card);
            });
        }

        // === INIT ===
        renderWords();
        renderSentences();

        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
