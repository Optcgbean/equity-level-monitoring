<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文詞語朗讀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .word-card {
            background: white;
            border-radius: 12px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .word-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
            letter-spacing: 0.05em;
        }
        .play-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #e74c3c;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.3);
        }
        .play-btn:hover {
            background: #c0392b;
        }
        .play-btn:active {
            transform: scale(0.92);
        }
        .play-btn.playing {
            background: #27ae60;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.3);
        }
        .play-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            margin-left: 2px;
        }
        .divider {
            text-align: center;
            color: #95a5a6;
            font-size: 0.75rem;
            margin: 20px 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        @media (max-width: 400px) {
            .word-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .word-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>中文詞語朗讀</h1>
        <p class="subtitle">點擊按鈕朗讀詞語</p>

        <div class="word-grid" id="wordGrid"></div>
    </div>

    <script>
        const words = [
            { text: "興奮", pinyin: "xīng fèn" },
            { text: "緊張", pinyin: "jǐn zhāng" },
            { text: "失望", pinyin: "shī wàng" },
            { text: "假裝", pinyin: "jiǎ zhuāng" },
            { text: "模仿", pinyin: "mó fǎng" },
            { text: "可愛", pinyin: "kě ài" },
            { text: "終於", pinyin: "zhōng yú" },
            { text: "願意", pinyin: "yuàn yì" },
            { text: "輪流", pinyin: "lún liú" },
            { text: "神氣", pinyin: "shén qì" },
            { text: "擔心", pinyin: "dān xīn" },
            { text: "清早", pinyin: "qīng zǎo" },
            { text: "滿意", pinyin: "mǎn yì" },
            { text: "仔細", pinyin: "zǐ xì" },
            { text: "精神一振", pinyin: "jīng shén yī zhèn" },
            { text: "需要", pinyin: "xū yào" },
            { text: "習慣", pinyin: "xí guàn" },
            { text: "歡呼", pinyin: "huān hū" },
            { text: "忘記", pinyin: "wàng jì" },
            { text: "自言自語", pinyin: "zì yán zì yǔ" }
        ];

        const grid = document.getElementById('wordGrid');
        let currentUtterance = null;
        let currentBtn = null;

        const playIcon = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        const stopIcon = '<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>';

        words.forEach((word, index) => {
            const card = document.createElement('div');
            card.className = 'word-card';

            const text = document.createElement('div');
            text.className = 'word-text';
            text.textContent = word.text;

            const btn = document.createElement('button');
            btn.className = 'play-btn';
            btn.innerHTML = playIcon;
            btn.setAttribute('aria-label', `朗讀 ${word.text}`);
            btn.title = `朗讀：${word.text}`;

            btn.addEventListener('click', () => {
                if (currentBtn === btn && window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    resetBtn(btn);
                    currentBtn = null;
                    return;
                }

                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    if (currentBtn) resetBtn(currentBtn);
                }

                const utterance = new SpeechSynthesisUtterance(word.text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.85;
                utterance.pitch = 1;

                utterance.onstart = () => {
                    btn.innerHTML = stopIcon;
                    btn.classList.add('playing');
                    currentBtn = btn;
                };

                utterance.onend = () => {
                    resetBtn(btn);
                    currentBtn = null;
                };

                utterance.onerror = () => {
                    resetBtn(btn);
                    currentBtn = null;
                };

                window.speechSynthesis.speak(utterance);
            });

            card.appendChild(text);
            card.appendChild(btn);
            grid.appendChild(card);
        });

        function resetBtn(btn) {
            btn.innerHTML = playIcon;
            btn.classList.remove('playing');
        }
    </script>
</body>
</html>
