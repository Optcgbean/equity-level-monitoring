<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文詞語朗讀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e74c3c;
            display: inline-block;
        }

        /* === WORDS === */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .word-card {
            background: white;
            border-radius: 12px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .word-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
            letter-spacing: 0.05em;
        }
        .play-btn {
            width: auto;
            min-width: 100px;
            height: 42px;
            border-radius: 21px;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 16px;
            transition: background 0.2s, transform 0.1s;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
        }
        .play-btn:hover { transform: scale(1.03); }
        .play-btn:active { transform: scale(0.95); }
        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .play-btn .btn-label { white-space: nowrap; }

        .btn-word {
            background: #e74c3c;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.3);
        }
        .btn-word:hover { background: #c0392b; }
        .btn-word.playing-mandarin {
            background: #c0392b;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
        }
        .btn-word.playing-cantonese {
            background: #27ae60;
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.5);
        }

        /* === SENTENCES === */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .sentence-card {
            background: white;
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .sentence-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .sentence-header {
            font-size: 0.75rem;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .sentence-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #1a1a2e;
            margin-bottom: 14px;
        }
        .sentence-text .chunk {
            display: inline-block;
            padding: 2px 6px;
            margin: 1px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .sentence-text .chunk.active {
            background: #ffe0e0;
        }
        .chunk-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .btn-chunk {
            background: #f39c12;
            box-shadow: 0 2px 6px rgba(243, 156, 18, 0.3);
            min-width: auto;
            padding: 0 12px;
            height: 36px;
            font-size: 0.85rem;
            border-radius: 18px;
        }
        .btn-chunk:hover { background: #e67e22; }
        .btn-chunk.playing {
            background: #d35400;
            box-shadow: 0 2px 8px rgba(243, 156, 18, 0.5);
        }
        .btn-full {
            background: #3498db;
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.3);
            min-width: auto;
            padding: 0 14px;
            height: 36px;
            font-size: 0.8rem;
            border-radius: 18px;
        }
        .btn-full:hover { background: #2980b9; }
        .btn-full.playing {
            background: #2980b9;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.5);
        }

        @media (max-width: 420px) {
            .word-grid { grid-template-columns: repeat(2, 1fr); }
            .word-text { font-size: 1.4rem; }
            .play-btn { min-width: 90px; padding: 0 12px; font-size: 0.8rem; }
            .sentence-text { font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>中文詞語朗讀</h1>
        <p class="subtitle">點擊按鈕朗讀詞語</p>

        <div class="section">
            <div class="section-title">詞語</div>
            <div class="word-grid" id="wordGrid"></div>
        </div>

        <div class="section">
            <div class="section-title">句子</div>
            <div class="sentence-list" id="sentenceList"></div>
        </div>
    </div>

    <script>
        const words = [
            { text: "興奮", pinyin: "xīng fèn" },
            { text: "緊張", pinyin: "jǐn zhāng" },
            { text: "失望", pinyin: "shī wàng" },
            { text: "假裝", pinyin: "jiǎ zhuāng" },
            { text: "模仿", pinyin: "mó fǎng" },
            { text: "可愛", pinyin: "kě ài" },
            { text: "終於", pinyin: "zhōng yú" },
            { text: "願意", pinyin: "yuàn yì" },
            { text: "輪流", pinyin: "lún liú" },
            { text: "神氣", pinyin: "shén qì" },
            { text: "擔心", pinyin: "dān xīn" },
            { text: "清早", pinyin: "qīng zǎo" },
            { text: "滿意", pinyin: "mǎn yì" },
            { text: "仔細", pinyin: "zǐ xì" },
            { text: "精神一振", pinyin: "jīng shén yī zhèn" },
            { text: "需要", pinyin: "xū yào" },
            { text: "習慣", pinyin: "xí guàn" },
            { text: "歡呼", pinyin: "huān hū" },
            { text: "忘記", pinyin: "wàng jì" },
            { text: "自言自語", pinyin: "zì yán zì yǔ" }
        ];

        const sentences = [
            { group: "第一組", text: "1. 小烏龜很失望，一邊爬一邊想。" },
            { group: "第一組", text: "2. 從現在開始，每種動物都按照自己習慣的方式過日子。" },
            { group: "第二組", text: "1. 她又興奮又緊張，等待去一個新的家。" },
            { group: "第二組", text: "2. 小桃花立即精神一振，她的新生活終於開始了！" },
            { group: "第三組", text: "1. 小桃花賣不出去，給無情地掃到一邊。" },
            { group: "第三組", text: "2. 森林旅店開業那天，許多旅客來住宿，把小兔忙得團團轉。" },
            { group: "第四組", text: "1. 誰做得最好，誰就是森林裏的新大王。" },
            { group: "第四組", text: "2. 森林裏來來往往的旅客很多，可是沒有一家旅店。" },
            { group: "第五組", text: "1. 小兔仔細地閱讀旅客的批評意見。" },
            { group: "第五組", text: "2. 小烏龜一聽，馬上把葉子、筷子、繩子全部抖下來。" }
        ];

        let currentBtn = null;
        let isPlaying = false;
        let activeChunkEl = null;

        const playIcon = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        const stopIcon = '<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>';

        function speak(text, lang, rate, pitch) {
            return new Promise((resolve) => {
                window.speechSynthesis.cancel();
                setTimeout(() => {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = lang;
                    u.rate = rate;
                    u.pitch = pitch;
                    u.onend = () => resolve();
                    u.onerror = () => resolve();
                    window.speechSynthesis.speak(u);
                }, 80);
            });
        }

        function stopAll() {
            window.speechSynthesis.cancel();
            isPlaying = false;
            if (currentBtn) {
                resetBtn(currentBtn);
                currentBtn = null;
            }
            if (activeChunkEl) {
                activeChunkEl.classList.remove('active');
                activeChunkEl = null;
            }
        }

        function resetBtn(btn) {
            btn.classList.remove('playing', 'playing-mandarin', 'playing-cantonese');
            btn.innerHTML = playIcon + '<span class="btn-label">' + btn.dataset.label + '</span>';
        }

        function setPlaying(btn) {
            if (currentBtn && currentBtn !== btn) resetBtn(currentBtn);
            currentBtn = btn;
            isPlaying = true;
            btn.classList.add('playing');
            btn.innerHTML = stopIcon + '<span class="btn-label">播放中</span>';
        }

        // === WORDS: single button plays Mandarin then Cantonese ===
        async function playWordSequence(word, btn) {
            if (isPlaying && currentBtn === btn) { stopAll(); return; }
            stopAll();
            currentBtn = btn;
            isPlaying = true;

            btn.className = 'play-btn btn-word playing-mandarin';
            btn.innerHTML = playIcon + '<span class="btn-label">普通話</span>';
            await speak(word.text, 'zh-TW', 0.85, 1);

            btn.className = 'play-btn btn-word playing-cantonese';
            btn.innerHTML = playIcon + '<span class="btn-label">粵語</span>';
            await speak(word.text, 'zh-HK', 0.85, 1);

            resetBtn(btn);
            isPlaying = false;
            currentBtn = null;
        }

        function renderWords() {
            const grid = document.getElementById('wordGrid');
            words.forEach((word) => {
                const card = document.createElement('div');
                card.className = 'word-card';

                const text = document.createElement('div');
                text.className = 'word-text';
                text.textContent = word.text;

                const btn = document.createElement('button');
                btn.className = 'play-btn btn-word';
                btn.dataset.label = '朗讀';
                btn.innerHTML = playIcon + '<span class="btn-label">朗讀</span>';
                btn.title = `朗讀：${word.text}`;
                btn.addEventListener('click', () => playWordSequence(word, btn));

                card.appendChild(text);
                card.appendChild(btn);
                grid.appendChild(card);
            });
        }

        // === SENTENCES: chunk buttons + full sentence ===
        function extractChineseChars(text) {
            return text.replace(/[^\u4e00-\u9fff]/g, '');
        }

        function chunkChinese(text, size = 4) {
            const chars = extractChineseChars(text);
            const chunks = [];
            for (let i = 0; i < chars.length; i += size) {
                chunks.push(chars.slice(i, i + size));
            }
            return chunks;
        }

        async function playChunk(chunkText, btn, chunkEl) {
            if (isPlaying && currentBtn === btn) { stopAll(); return; }
            stopAll();
            if (chunkEl) {
                chunkEl.classList.add('active');
                activeChunkEl = chunkEl;
            }
            setPlaying(btn);
            await speak(chunkText, 'zh-TW', 0.8, 1);
            resetBtn(btn);
            if (chunkEl) chunkEl.classList.remove('active');
            isPlaying = false;
            currentBtn = null;
        }

        async function playFullSentence(text, btn) {
            if (isPlaying && currentBtn === btn) { stopAll(); return; }
            stopAll();
            setPlaying(btn);
            await speak(text.replace(/^[12]\.\s*/, ''), 'zh-TW', 0.8, 1);
            resetBtn(btn);
            isPlaying = false;
            currentBtn = null;
        }

        function renderSentences() {
            const list = document.getElementById('sentenceList');
            sentences.forEach((sentence) => {
                const card = document.createElement('div');
                card.className = 'sentence-card';

                const header = document.createElement('div');
                header.className = 'sentence-header';
                header.textContent = sentence.group;

                const textDiv = document.createElement('div');
                textDiv.className = 'sentence-text';
                textDiv.textContent = sentence.text;

                const chunks = chunkChinese(sentence.text, 4);
                const chunkRow = document.createElement('div');
                chunkRow.className = 'chunk-row';

                chunks.forEach((chunk, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'play-btn btn-chunk';
                    btn.dataset.label = chunk;
                    btn.innerHTML = playIcon + '<span class="btn-label">' + chunk + '</span>';
                    btn.title = `朗讀：${chunk}`;
                    btn.addEventListener('click', () => playChunk(chunk, btn, null));
                    chunkRow.appendChild(btn);
                });

                const fullBtn = document.createElement('button');
                fullBtn.className = 'play-btn btn-full';
                fullBtn.dataset.label = '全句';
                fullBtn.innerHTML = playIcon + '<span class="btn-label">全句</span>';
                fullBtn.title = '朗讀整句';
                fullBtn.addEventListener('click', () => playFullSentence(sentence.text, fullBtn));
                chunkRow.appendChild(fullBtn);

                card.appendChild(header);
                card.appendChild(textDiv);
                card.appendChild(chunkRow);
                list.appendChild(card);
            });
        }

        renderWords();
        renderSentences();

        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
