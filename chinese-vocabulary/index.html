<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文詞語朗讀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .lang-note {
            text-align: center;
            color: #e74c3c;
            font-size: 0.8rem;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .word-card {
            background: white;
            border-radius: 12px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .word-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
            letter-spacing: 0.05em;
        }
        .play-btn {
            width: auto;
            min-width: 100px;
            height: 42px;
            border-radius: 21px;
            border: none;
            background: #e74c3c;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 16px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.3);
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
        }
        .play-btn:hover {
            background: #c0392b;
        }
        .play-btn:active {
            transform: scale(0.95);
        }
        .play-btn.playing-mandarin {
            background: #e74c3c;
            box-shadow: 0 2px 6px rgba(231, 76, 60, 0.4);
        }
        .play-btn.playing-cantonese {
            background: #27ae60;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.4);
        }
        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .play-btn .btn-label {
            white-space: nowrap;
        }
        @media (max-width: 400px) {
            .word-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .word-text {
                font-size: 1.4rem;
            }
            .play-btn {
                min-width: 90px;
                padding: 0 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>中文詞語朗讀</h1>
        <p class="subtitle">點擊按鈕朗讀詞語</p>
        <p class="lang-note">🔊 先讀普通話，再讀粵語</p>

        <div class="word-grid" id="wordGrid"></div>
    </div>

    <script>
        const words = [
            { text: "興奮", pinyin: "xīng fèn" },
            { text: "緊張", pinyin: "jǐn zhāng" },
            { text: "失望", pinyin: "shī wàng" },
            { text: "假裝", pinyin: "jiǎ zhuāng" },
            { text: "模仿", pinyin: "mó fǎng" },
            { text: "可愛", pinyin: "kě ài" },
            { text: "終於", pinyin: "zhōng yú" },
            { text: "願意", pinyin: "yuàn yì" },
            { text: "輪流", pinyin: "lún liú" },
            { text: "神氣", pinyin: "shén qì" },
            { text: "擔心", pinyin: "dān xīn" },
            { text: "清早", pinyin: "qīng zǎo" },
            { text: "滿意", pinyin: "mǎn yì" },
            { text: "仔細", pinyin: "zǐ xì" },
            { text: "精神一振", pinyin: "jīng shén yī zhèn" },
            { text: "需要", pinyin: "xū yào" },
            { text: "習慣", pinyin: "xí guàn" },
            { text: "歡呼", pinyin: "huān hū" },
            { text: "忘記", pinyin: "wàng jì" },
            { text: "自言自語", pinyin: "zì yán zì yǔ" }
        ];

        const grid = document.getElementById('wordGrid');
        let currentBtn = null;
        let isPlaying = false;

        const playIcon = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        const stopIcon = '<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>';
        const waitIcon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';

        function speak(text, lang, rate, pitch, onEnd) {
            return new Promise((resolve) => {
                window.speechSynthesis.cancel();
                // Small delay to ensure cancel takes effect
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    utterance.rate = rate;
                    utterance.pitch = pitch;
                    utterance.onend = () => {
                        if (onEnd) onEnd();
                        resolve();
                    };
                    utterance.onerror = () => {
                        resolve();
                    };
                    window.speechSynthesis.speak(utterance);
                }, 100);
            });
        }

        async function playSequence(word, btn) {
            if (isPlaying && currentBtn === btn) {
                window.speechSynthesis.cancel();
                isPlaying = false;
                resetBtn(btn);
                currentBtn = null;
                return;
            }

            if (isPlaying) {
                window.speechSynthesis.cancel();
                if (currentBtn) resetBtn(currentBtn);
            }

            isPlaying = true;
            currentBtn = btn;

            // Phase 1: Mandarin
            btn.className = 'play-btn playing-mandarin';
            btn.innerHTML = playIcon + '<span class="btn-label">普通話</span>';

            await speak(word.text, 'zh-TW', 0.85, 1, () => {
                // Phase 2: Cantonese
                btn.className = 'play-btn playing-cantonese';
                btn.innerHTML = playIcon + '<span class="btn-label">粵語</span>';
            });

            // Phase 2: Cantonese
            await speak(word.text, 'zh-HK', 0.85, 1);

            // Reset
            resetBtn(btn);
            isPlaying = false;
            currentBtn = null;
        }

        function resetBtn(btn) {
            btn.className = 'play-btn';
            btn.innerHTML = playIcon + '<span class="btn-label">朗讀</span>';
        }

        words.forEach((word) => {
            const card = document.createElement('div');
            card.className = 'word-card';

            const text = document.createElement('div');
            text.className = 'word-text';
            text.textContent = word.text;

            const btn = document.createElement('button');
            btn.className = 'play-btn';
            btn.innerHTML = playIcon + '<span class="btn-label">朗讀</span>';
            btn.setAttribute('aria-label', `朗讀 ${word.text}（普通話及粵語）`);
            btn.title = `朗讀：${word.text}`;

            btn.addEventListener('click', () => playSequence(word, btn));

            card.appendChild(text);
            card.appendChild(btn);
            grid.appendChild(card);
        });

        // Ensure voices are loaded (some browsers need this)
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
